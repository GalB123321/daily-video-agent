# Daily video agent configuration. Portrait 1080x1920 at 30fps.
watch_folder: "/Users/galbaumel/Shared/photos"
output_folder: "./output"
archive_processed: true

target:
  resolution: "1080x1920"
  fps: 30

trim:
  margin: "0.2sec"
  edit_mode: "audio"

subtitles:
  enabled: true
  language: "en"

music:
  enabled: true
  track: "./assets/music.mp3"
  volume: 0.25
  duck_under_speech: false

titles:
  enabled: false

broll:
  enabled: false

creative_llm:
  enabled: false

notify:
  method: "macos_notification"
