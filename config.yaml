# Daily video agent. Portrait 1080x1920 at 30fps.
#
# This is the short everyday config. To change the overall look, just change
# the preset below to "cinematic" or "balanced". To fine tune one detail, copy
# the matching key from config.full.yaml into this file. Anything you set here
# wins over the preset, and the preset wins over the built in defaults.

preset: "punchy"            # punchy | cinematic | balanced

watch_folder: "/Users/galbaumel/Shared/photos"
output_folder: "./output"
archive_processed: true

